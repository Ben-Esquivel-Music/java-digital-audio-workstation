name: "Copilot Setup Steps"

on:
    workflow_dispatch:
    push:
        paths:
            - .github/workflows/copilot-setup-steps.yml
    pull_request:
        paths:
            - .github/workflows/copilot-setup-steps.yml

jobs:
    copilot-setup-steps:
        runs-on: ubuntu-latest

        permissions:
            contents: read

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up JDK 26
              uses: actions/setup-java@v4
              with:
                  java-version: "26"
                  distribution: "temurin"
                  cache: "maven"

            - name: Install native build dependencies
              run: |
                  sudo apt-get update -qq
                  sudo apt-get install -y -qq cmake build-essential libasound2-dev pkg-config \
                    libglib2.0-dev libsndfile1-dev xvfb \
                    libmp3lame0 libmp3lame-dev libfdk-aac2 libfdk-aac-dev

            - name: Build all modules (skip tests)
              run: mvn -B install -DskipTests
