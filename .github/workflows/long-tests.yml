name: Long-Running Render Tests

# End-to-end render / export tests under the `long-tests` Maven profile
# (story 209). Excluded from the fast PR feedback loop — runs only on
# pushes to `main` and on a daily schedule.
on:
  push:
    branches: [ main ]
  schedule:
    # Daily at 03:30 UTC — off-peak for most contributors.
    - cron: '30 3 * * *'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  # Allow at most one long-tests run per ref; cancel queued duplicates.
  group: long-tests-${{ github.ref }}
  cancel-in-progress: false

jobs:
  long-tests:
    name: mvn -Plong-tests verify
    runs-on: ubuntu-latest
    # Generous timeout — individual tests enforce per-budget gates via
    # LongTestHarness, but the whole pipeline runs many of them.
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 26
        uses: actions/setup-java@v4
        with:
          java-version: '26'
          distribution: 'temurin'
          cache: 'maven'

      - name: Install native build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cmake build-essential libasound2-dev pkg-config \
            libglib2.0-dev libsndfile1-dev xvfb \
            libmp3lame0 libmp3lame-dev libfdk-aac2 libfdk-aac-dev

      - name: Run long-tests profile
        # daw-app long tests need a screen — xvfb supplies a virtual one.
        run: xvfb-run --auto-servernum mvn -B -Plong-tests verify

      - name: Upload long-test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: long-test-reports
          path: '**/target/long-test-reports/**'
          retention-days: 30

      - name: Upload produced artefacts (on failure, for golden diff)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: long-test-failure-artefacts
          path: |
            **/target/long-test-reports/*-output.txt
            **/target/surefire-reports/*-output.txt
          retention-days: 14
