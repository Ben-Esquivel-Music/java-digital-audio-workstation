# Global JUnit 5 safety net for the daw-app FX test suite.
#
# Surefire reuses ONE forked JVM (and ONE JavaFX toolkit) for all ~78 FX test
# classes. If an earlier class wedges the Glass/Prism toolkit (most commonly on
# a non-headless Windows desktop, where no Monocle headless platform is
# configured), every later class's Platform.runLater callbacks stop executing
# and its CountDownLatch.await(...) calls would otherwise block the whole build
# with no fork timeout in the default profile.
#
# A per-test timeout converts that unbounded hang into a fast, attributable
# failure. The timeout thread mode runs each test on a worker thread and
# interrupts it on expiry, so a blocked latch.await(...) is interruptible.
junit.jupiter.execution.timeout.test.default = 60 s
junit.jupiter.execution.timeout.lifecycle.method.default = 60 s
junit.jupiter.execution.timeout.thread.mode.default = SEPARATE_THREAD
