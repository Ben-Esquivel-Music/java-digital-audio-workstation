# -----------------------------------------------------------------------------
# ZGC tuning profile for the DAW's real-time audio thread
# -----------------------------------------------------------------------------
#
# This file is a JVM options file (pass to the launcher via @<path>/zgc.conf).
# Each line is a single JVM argument. Lines starting with '#' are comments.
#
# Rationale — a GC pause that exceeds the audio buffer period (2–11 ms at a
# typical 64–512 sample buffer at 48 kHz) produces an audible dropout. These
# flags configure ZGC for real-time-like behavior on Java 26. They MUST be
# paired with aggressive buffer pooling on the audio thread (see
# AudioBufferPoolRegistry, MidiEventPool, and the XrunEvent / LatencyTelemetry
# ring buffers) so the audio callback performs no heap allocation.
#
# Tradeoffs are documented in docs/java26-setup.md.
# -----------------------------------------------------------------------------

# Use the Z Garbage Collector. As of JDK 24 (JEP 490, "ZGC: Remove the
# Non-Generational Mode"), ZGC is generational by default and the old
# -XX:+ZGenerational flag has been removed — enabling ZGC on JDK 26
# automatically selects the generational collector (JEP 439, JDK 21).
-XX:+UseZGC

# Do NOT uncommit heap pages back to the OS. Returning pages incurs a madvise
# cost; reacquiring them on the next allocation can stall the audio thread.
# Trading memory for determinism is always the right call in a DAW.
-XX:-ZUncommit

# Pre-touch every page of the heap at startup so page faults never occur on
# the audio thread. Startup is slightly slower; steady-state is deterministic.
-XX:+AlwaysPreTouch

# Pin -Xms == -Xmx to the projected session memory footprint (set by the
# launcher at runtime via ${sessionMem}). A fixed-size heap prevents heap
# expansion pauses and makes AlwaysPreTouch effective.
#
# The launcher (DawLauncher) substitutes ${sessionMem} before writing the
# file into the user settings directory; values such as 2G, 4G, 8G are valid.
-Xms${sessionMem}
-Xmx${sessionMem}
