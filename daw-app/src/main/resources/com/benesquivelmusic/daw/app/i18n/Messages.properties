performanceStage.overlay.fileBack=Back

# Workshop view (story 281) -- UI Design Book §4 Concept F.
# Sound-design layout pairing 60% arrangement with 40% focused-plugin GUI
# plus clip detail below. Static chrome strings only — breadcrumb segment
# text is composed dynamically in WorkshopView#buildSegments. Section-
# scoped prefix per the file convention.
workshop.detach=◯ Detach
workshop.plugin.empty=No plugin focused. Click an insert to open it here.
# Breadcrumb segment separator -- ▸ (BLACK RIGHT-POINTING SMALL TRIANGLE).
# BreadcrumbBar keeps DEFAULT_SEPARATOR as a code-level fallback for non-
# Workshop callers, but Workshop sources this glyph explicitly from the
# bundle so locale overrides can swap it without touching code.
workshop.breadcrumb.separator=▸
# Breadcrumb segment format templates — i18n-friendly so locales can
# reorder or relabel without touching code (Skill §14).
workshop.breadcrumb.trackFormat=Track %02d
workshop.breadcrumb.insertFormat=Insert %d
