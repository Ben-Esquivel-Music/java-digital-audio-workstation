# Inspector i18n keys — UI Design Book §5.6, story 272.
#
# Section-scoped prefix per Skill §14. Add new keys here rather than
# hard-coding strings in code or FXML. All user-facing inspector
# strings flow through this bundle.

inspector.rail.label=INSPECTOR

inspector.section.track=TRACK
inspector.section.inserts=INSERTS
inspector.section.sends=SENDS
inspector.section.routing=ROUTING
inspector.section.notes=NOTES
inspector.section.notifications=NOTIFICATIONS

inspector.track.name=Name
inspector.track.color=Colour
inspector.track.type=Type
inspector.track.input=Input
inspector.track.output=Output

inspector.inserts.add=+ Add
inspector.placeholder.empty=No selection

# Notification chrome strings (story 273) — content is caller-supplied
# and unchanged; only these static surfaces come from the bundle.
notification.dismiss=Dismiss
notification.clear=Clear
notification.action.undo=Undo
notification.level.success=Success
notification.level.info=Information
notification.level.warning=Warning
notification.level.error=Error
notification.empty=No notifications

# Status bar (story 274) — UI Design Book §5.11. Static chrome strings
# only; numeric values stay dynamic in code (§5.11). Every cell after
# the first carries a leading "· " (MIDDLE DOT + space): JavaFX CSS has
# no :first-child, so the separator is part of the cell text (story §6,
# Skill §15). CPU/MEM/DSK are placeholders — no system telemetry source
# exists yet (PerformanceMonitor tracks only audio-DSP load; live wiring
# is a documented follow-on). statusbar.cpu/mem/dsk also appear as the
# design-time text in main-view.fxml; StatusBarFxmlTest pins the two to
# the same value so they cannot drift.
statusbar.cpu=· CPU --
statusbar.mem=· MEM --
statusbar.dsk=· DSK --
statusbar.autosave.on=· Auto-save: ON
statusbar.io.initializing=· Initializing I/O...
statusbar.monitoring.mono=· Mono
statusbar.monitoring.stereo=· Stereo
statusbar.monitoring.surround=· {0}ch Surround
